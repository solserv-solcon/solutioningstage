<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: linear-gradient(135deg, #eef2f7, #f7f9fc);
  color: #1f2937;
}

/* Header */
header {
  padding: 24px 32px;
  background: rgba(47, 128, 237, 0.95);
  color: white;
  backdrop-filter: blur(10px);
}

header h2 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
}

header p {
  margin: 4px 0 0;
  font-size: 13px;
  opacity: 0.85;
}

/* Layout */
.container {
  padding: 24px 32px;
  max-width: 1200px;
  margin: auto;
}

/* KPI Cards */
.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-3px);
}

.card h3 {
  margin: 0;
  font-size: 12px;
  color: #6b7280;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card p {
  margin: 8px 0 0;
  font-size: 22px;
  font-weight: 700;
}

/* Chart */
.chart-box {
  background: rgba(255,255,255,0.85);
  border-radius: 16px;
  padding: 20px;
  margin: 20px 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

/* Table */
.table-container {
  background: rgba(255,255,255,0.85);
  border-radius: 16px;
  padding: 16px;
  overflow-x: auto;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  padding: 12px 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #f3f6ff;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #374151;
}

tr:hover td {
  background: #f9fbff;
}

/* Last updated */
.meta {
  margin-top: 10px;
  font-size: 12px;
  color: #6b7280;
}

/* Responsive */
@media (max-width: 600px) {
  header {
    padding: 18px;
  }

  .container {
    padding: 16px;
  }
}
</style>
</head>

<body>

<header>
  <h2>📊 Live Google Sheets Dashboard</h2>
  <p>Auto-syncing data from spreadsheet</p>
</header>

<div class="container">

  <!-- KPIs -->
  <div class="kpis">
    <div class="card">
      <h3>Total Rows</h3>
      <p id="totalRows">0</p>
    </div>

    <div class="card">
      <h3>Last Updated</h3>
      <p id="lastUpdated">-</p>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table id="table"></table>
  </div>

  <div class="meta">
    Refreshes every 60 seconds
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsvFbwvg5SnFVAoRenv1dvGayWXKZq-RJ2fuhPCofX6ro2MC-BLIwL1_rZ3az9iwSkKtl9_aSSak9g/pub?gid=488974230&single=true&output=csv";

let chart;

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const parsed = Papa.parse(text, {
      skipEmptyLines: true
    });

    const rows = parsed.data;

    renderTable(rows);
    renderKPIs(rows);
    renderChart(rows);

    document.getElementById("lastUpdated").innerText =
      new Date().toLocaleString();

  } catch (err) {
    console.error("CSV error:", err);
  }
}

function renderTable(rows) {
  const table = document.getElementById("table");
  table.innerHTML = "";

  rows.forEach((row, i) => {
    const tr = document.createElement("tr");

    row.forEach(cell => {
      const el = document.createElement(i === 0 ? "th" : "td");
      el.textContent = cell || "";
      tr.appendChild(el);
    });

    table.appendChild(tr);
  });
}

function renderKPIs(rows) {
  document.getElementById("totalRows").innerText = rows.length - 1;
}

function renderChart(rows) {
  if (rows.length < 2) return;

  const labels = rows.slice(1).map(r => r[0]);
  const values = rows.slice(1).map(r => Number(r[1]) || 0);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: rows[0][1] || "Value",
        data: values,
        backgroundColor: "#2f80ed"
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      }
    }
  });
}

setInterval(loadData, 60000);
loadData();
</script>

</body>
</html>
