<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:         #e8ede9;
    --bg-inset:   #dce3dd;
    --surface:    #e8ede9;
    --green:      #3a7d52;
    --green-lt:   #5aab73;
    --text:       #2a3c2f;
    --text-muted: #7a9480;

    /* neumorphic shadows: light top-left, dark bottom-right */
    --neu-raise:  3px 3px 8px #d0d6d1, -3px -3px 8px #ffffff;
    --neu-inset:  inset 2px 2px 6px #d0d6d1, inset -2px -2px 6px #ffffff;
    --neu-hover:  4px 4px 10px #caced0, -4px -4px 10px #ffffff;

    --radius: 18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Outfit", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header — no background ── */
  header {
    padding: 32px 40px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-icon {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    background: var(--bg);
    box-shadow: var(--neu-raise);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.4px;
  }

  header p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }

  /* ── Layout ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 8px 40px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── KPI Cards ── */
  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: var(--neu-raise);
    transition: box-shadow 0.25s ease;
  }

  .card:hover {
    box-shadow: var(--neu-hover);
  }

  .card h3 {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .card p {
    font-size: 28px;
    font-weight: 600;
    color: var(--green);
    margin-top: 12px;
    font-family: "DM Mono", monospace;
    letter-spacing: -1px;
  }

  /* ── Chart ── */
  .chart-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--neu-raise);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* ── Table ── */
  .table-container {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--neu-raise);
  }

  .table-header {
    padding: 20px 24px 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  th {
    background: var(--bg-inset);
    box-shadow: var(--neu-inset);
    padding: 12px 20px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  td {
    padding: 13px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    color: var(--text);
    font-family: "DM Mono", monospace;
    font-size: 13px;
    font-weight: 400;
  }

  tbody tr:last-child td { border-bottom: none; }

  tbody tr:hover td {
    background: rgba(58, 125, 82, 0.04);
  }

  td a {
    color: var(--green);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── Footer meta ── */
  .meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 400;
  }

  .pulse {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-lt);
    box-shadow: 0 0 0 0 rgba(90, 171, 115, 0.5);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(90, 171, 115, 0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(90, 171, 115, 0); }
    100% { box-shadow: 0 0 0 0 rgba(90, 171, 115, 0); }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 24px 20px 12px; }
    .container { padding: 8px 20px 32px; }
    .card p { font-size: 22px; }
  }
</style>
</head>

<body>

<header>
  <div class="header-icon">📊</div>
  <div>
    <h2>Live Google Sheets Dashboard</h2>
    <p>Auto-syncing from spreadsheet</p>
  </div>
</header>

<div class="container">

  <!-- KPIs -->
  <div class="kpis">
    <div class="card">
      <h3>Total Rows</h3>
      <p id="totalRows">—</p>
    </div>
    <div class="card">
      <h3>Last Updated</h3>
      <p id="lastUpdated" style="font-size:15px;letter-spacing:0">—</p>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-box">
    <div class="section-label">Chart View</div>
    <canvas id="chart"></canvas>
  </div>

  <!-- Table -->
  <div class="table-container">
    <div class="table-header">
      <div class="section-label" style="margin:0">Data Table</div>
    </div>
    <div style="overflow-x:auto">
      <table id="table"></table>
    </div>
  </div>

  <div class="meta">
    <span class="pulse"></span>
    Refreshes every 60 seconds
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsvFbwvg5SnFVAoRenv1dvGayWXKZq-RJ2fuhPCofX6ro2MC-BLIwL1_rZ3az9iwSkKtl9_aSSak9g/pub?gid=488974230&single=true&output=csv";

let chart;

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const parsed = Papa.parse(text, { skipEmptyLines: true });
    const rows = parsed.data;

    renderTable(rows);
    renderKPIs(rows);
    renderChart(rows);

    document.getElementById("lastUpdated").innerText =
      new Date().toLocaleTimeString();

  } catch (err) {
    console.error("CSV error:", err);
  }
}

function renderTable(rows) {
  const table = document.getElementById("table");
  table.innerHTML = "";

  rows.forEach((row, i) => {
    const tr = document.createElement("tr");

    row.forEach(cell => {
      const el = document.createElement(i === 0 ? "th" : "td");
      const value = cell || "";

      if (typeof value === "string" && value.startsWith("http")) {
        const a = document.createElement("a");
        a.href = value;
        a.textContent = value;
        a.target = "_blank";
        el.appendChild(a);
      } else {
        el.textContent = value;
      }

      tr.appendChild(el);
    });

    table.appendChild(tr);
  });
}

function renderKPIs(rows) {
  document.getElementById("totalRows").innerText = rows.length - 1;
}

function renderChart(rows) {
  if (rows.length < 2) return;

  const labels = rows.slice(1).map(r => r[0]);
  const values = rows.slice(1).map(r => Number(r[1]) || 0);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: rows[0][1] || "Value",
        data: values,
        backgroundColor: "#22c55e",
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: "#6b7280", font: { family: "DM Sans", size: 12 } }
        },
        y: {
          grid: { color: "#f0fdf4" },
          ticks: { color: "#6b7280", font: { family: "DM Mono", size: 12 } }
        }
      }
    }
  });
}

setInterval(loadData, 60000);
loadData();
</script>

</body>
</html>
