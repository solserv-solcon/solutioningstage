<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6fb;
  color: #333;
}

header {
  background: #2f80ed;
  color: white;
  padding: 20px;
}

.container {
  padding: 20px;
}

.kpis {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  flex: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #777;
}

.card p {
  font-size: 22px;
  margin: 5px 0 0;
  font-weight: bold;
}

.table-container {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
  font-size: 14px;
}

th {
  background: #f0f4ff;
}

canvas {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h2>📊 Live Google Sheets Dashboard</h2>
</header>

<div class="container">

  <div class="kpis">
    <div class="card">
      <h3>Total Rows</h3>
      <p id="totalRows">0</p>
    </div>
    <div class="card">
      <h3>Last Updated</h3>
      <p id="lastUpdated">-</p>
    </div>
  </div>

  <canvas id="chart"></canvas>

  <div class="table-container">
    <table id="table"></table>
  </div>

</div>

<script>
/* ✅ FIXED GOOGLE SHEETS CSV LINK */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsvFbwvg5SnFVAoRenv1dvGayWXKZq-RJ2fuhPCofX6ro2MC-BLIwL1_rZ3az9iwSkKtl9_aSSak9g/pub?gid=488974230&single=true&output=csv";

let chart;

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const rows = text
      .split("\n")
      .filter(r => r.trim() !== "")
      .map(r => r.split(","));

    renderTable(rows);
    renderKPIs(rows);
    renderChart(rows);

    document.getElementById("lastUpdated").innerText =
      new Date().toLocaleString();

  } catch (err) {
    console.error("Error loading data:", err);
  }
}

function renderTable(rows) {
  const table = document.getElementById("table");
  table.innerHTML = "";

  rows.forEach((row, i) => {
    const tr = document.createElement("tr");

    row.forEach(cell => {
      const el = document.createElement(i === 0 ? "th" : "td");
      el.textContent = cell || "";
      tr.appendChild(el);
    });

    table.appendChild(tr);
  });
}

function renderKPIs(rows) {
  document.getElementById("totalRows").innerText = rows.length - 1;
}

function renderChart(rows) {
  if (rows.length < 2) return;

  const labels = rows.slice(1).map(r => r[0]);
  const values = rows.slice(1).map(r => Number(r[1]) || 0);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: rows[0][1] || "Value",
        data: values
      }]
    }
  });
}

setInterval(loadData, 60000);
loadData();
</script>

</body>
</html>
